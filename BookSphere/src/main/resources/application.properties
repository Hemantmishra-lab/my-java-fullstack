db.driver = com.mysql.cj.jdbc.Driver;
db.url = jdbc:mysql://localhost:3306/booksphere_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.username = root
db.password = 123456789

hikari.pool-name = BookSphere
hikari.maximum-pool-size = 10
hikari.minimum-idle = 3
hikari.idle-timeout = 600000
hikari.connection-timeout = 30000
hikari.max-lifecycle = 1800000

hibernate.dialect = org.hibernate.dialect.MySQLDialect
hibernate.show_sql = true
hibernate.format_sql = true
hibernate.hbm2ddl.auto = update
hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoreNamingStrategy
hibernate.jdbc.batch = 12

seed.data.enabled = true